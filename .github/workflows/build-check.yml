name: build-check

# Cloned tools: delete any job below for an app/ you remove from this repo.
# The template itself is skipped via the is_template guard.

on:
  pull_request:
    branches: [main, uat]

jobs:
  web:
    name: web · build
    runs-on: ubuntu-latest
    if: github.event.repository.is_template == false
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  api:
    name: api · install
    runs-on: ubuntu-latest
    if: github.event.repository.is_template == false
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: pdo_mysql, zip, bcmath, intl
      - run: composer install --no-interaction --prefer-dist --no-progress

  puppeteer:
    name: puppeteer · build
    runs-on: ubuntu-latest
    if: github.event.repository.is_template == false
    defaults:
      run:
        working-directory: apps/puppeteer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/puppeteer/package-lock.json
      - run: npm ci
      - run: npm run build
