name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd ~/${{ github.event.repository.name }}

            echo "→ Pulling latest"
            git fetch origin main
            git reset --hard origin/main

            echo "→ Rebuilding containers"
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build

            # Conditional steps based on which services exist in this repo
            services=$(docker compose -f docker-compose.prod.yml config --services)

            if echo "$services" | grep -q '^api$'; then
              echo "→ Running migrations"
              docker compose -f docker-compose.prod.yml --env-file .env exec -T api php artisan migrate --force
              echo "→ Clearing caches"
              docker compose -f docker-compose.prod.yml --env-file .env exec -T api php artisan config:clear
              docker compose -f docker-compose.prod.yml --env-file .env exec -T api php artisan route:clear
            fi

            echo "→ Pruning unused images"
            docker image prune -f

            echo "✓ Deploy complete"
